<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sleep Outside | Checkout</title>
    <link rel="stylesheet" href="../css/style.css" />
    <script src="../js/checkout.js" type="module"></script>
  </head>
  <body>
    <header class="divider" id="main-header"></header>
    <main class="divider checkout">
      <h2>Review & Place your Order</h2>
      <section class="checkout-form">
        <form name="checkout">
          <fieldset>
            <legend>Shipping</legend>
            <div class="checkout__name">
              <label for="fname">First Name</label>
              <input id="fname" name="fname" required />
              <label for="lname">Last Name</label>
              <input id="lname" name="lname" required />
            </div>
            <div class="checkout__address">
              <label for="street">Street</label>
              <input id="street" name="street" autocomplete="street-address" required />
              <label for="city">City</label>
              <input id="city" name="city" autocomplete="address-level2" required />
              <label for="state">State</label>
              <input
                id="state"
                name="state"
                autocomplete="address-level1"
                maxlength="2"
                pattern="[A-Za-z]{2}"
                title="Enter a 2-letter state code"
                required
              />
              <label for="zip">Zip</label>
              <input
                name="zip"
                id="zip"
                inputmode="numeric"
                autocomplete="postal-code"
                pattern="\d{5}"
                title="Enter a 5-digit ZIP code"
                required
              />
            </div>
          </fieldset>
          <fieldset>
            <legend>Payment</legend>
            <label for="cardNumber">Card number</label>
            <input
              id="cardNumber"
              name="cardNumber"
              inputmode="numeric"
              autocomplete="cc-number"
              pattern="\d{16}"
              title="Enter a 16-digit card number"
              required
            />
            <label for="expiration">Expiration</label>
            <input
              id="expiration"
              name="expiration"
              autocomplete="cc-exp"
              pattern="(0[1-9]|1[0-2])\/([0-9]{2}|[0-9]{4})"
              title="Use MM/YY or MM/YYYY"
              required
            />
            <label for="code">Security Code</label>
            <input
              id="code"
              name="code"
              inputmode="numeric"
              autocomplete="cc-csc"
              pattern="\d{3,4}"
              title="Enter a 3 or 4 digit security code"
              required
            />
          </fieldset>
          <fieldset class="checkout-summary">
            <legend>Order Summary</legend>
            <ul>
              <li>
                <label for="cartTotal"
                  >Item Subtotal(<span id="num-items"></span>)</label
                >
                <p name="cartTotal" id="cartTotal"></p>
              </li>
              <li>
                <label for="shipping">Shipping Estimate</label>
                <p id="shipping"></p>
              </li>
              <li>
                <label for="tax">Tax</label>
                <p id="tax"></p>
              </li>
              <li>
                <label for="orderTotal"><b>Order Total</b></label>
                <p id="orderTotal"></p>
              </li>
            </ul>
          </fieldset>

          <button id="checkoutSubmit" type="submit">Checkout</button>
        </form>
      </section>
    </main>
    <footer id="main-footer"></footer>
  </body>
</html>
